<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password - Blood_Info_Services</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="auth-wrap">
    <header class="auth-head">
      <a class="brand" href="/">Blood_Info_Services</a>
      <div class="auth-sub">Fast • Safe • Private Communication</div>
    </header>

    <form class="auth-card" method="post" action="/reset_password/{{ token }}" novalidate>
      <h2>Create New Password</h2>
      <p class="muted">Set a new password for your account.</p>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <label class="field">
        <span>New Password</span>
        <input name="password" type="password" placeholder="Enter new password" required />
      </label>

      <label class="field">
        <span>Confirm Password</span>
        <input name="confirm_password" type="password" placeholder="Confirm new password" required />
      </label>

      <button class="btn btn-primary" type="submit">Update Password</button>
      <a class="btn btn-link" href="/login">Back to Login</a>
    </form>
  </div>
</body>
</html>
