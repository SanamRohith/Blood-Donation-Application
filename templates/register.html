<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>
    Register - BloodLink
  </title>

  <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static', filename='favicon.png') }}"
  />

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      min-height:100vh;

      background:
      radial-gradient(
        circle at top left,
        rgba(255,0,0,.25),
        transparent 30%
      ),
      #020617;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px;
    }

    .auth-wrap{
      width:100%;
      max-width:650px;
    }

    .auth-card{

      background:#06122d;

      border:1px solid rgba(255,255,255,.08);

      border-radius:24px;

      padding:40px;

      box-shadow:
      0 0 30px rgba(255,0,0,.12);
    }

    .logo{

      color:white;

      font-size:48px;

      font-weight:800;

      margin-bottom:5px;
    }

    .logo span{
      color:#ff3b3b;
    }

    .tagline{

      color:#94a3b8;

      margin-bottom:30px;
    }

    h2{

      color:white;

      margin-bottom:25px;
    }

    .two-col{

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:16px;
    }

    .field{

      display:flex;

      flex-direction:column;

      margin-bottom:18px;
    }

    .field span{

      color:#cbd5e1;

      margin-bottom:8px;

      font-size:14px;
    }

    .field input{

      height:55px;

      border-radius:14px;

      border:1px solid rgba(255,255,255,.08);

      background:#020b1f;

      padding:0 16px;

      color:white;

      font-size:15px;

      outline:none;
    }

    .field input:focus{

      border-color:#ff3b3b;
    }

    .otp-btn,
    .btn-primary{

      width:100%;

      height:55px;

      border:none;

      border-radius:14px;

      cursor:pointer;

      color:white;

      font-size:17px;

      font-weight:700;

      background:
      linear-gradient(
        135deg,
        #ff4d4d,
        #ff1f1f
      );

      margin-top:10px;

      transition:.3s;
    }

    .otp-btn:hover,
    .btn-primary:hover{

      transform:translateY(-2px);

      box-shadow:
      0 0 20px rgba(255,0,0,.35);
    }

    #otp-section{
      display:none;
    }

    #recaptcha-container{
      margin-top:18px;
      margin-bottom:18px;
    }

    .success-text{

      color:#4ade80;

      margin-top:12px;

      font-size:14px;
    }

    .auth-links{

      margin-top:20px;

      text-align:center;
    }

    .auth-links a{

      color:#cbd5e1;

      text-decoration:none;

      font-size:14px;
    }

    .auth-links a:hover{
      color:#ff4d4d;
    }

    .dot{
      color:#64748b;
      margin:0 10px;
    }

    @media(max-width:700px){

      .two-col{
        grid-template-columns:1fr;
      }

      .auth-card{
        padding:28px;
      }

      .logo{
        font-size:40px;
      }

    }

  </style>

</head>

<body>

  <div class="auth-wrap">

    <div class="logo">
      Blood<span>Link</span>
    </div>

    <p class="tagline">
      Linking Blood to Life
    </p>

    <form
      id="register-form"
      class="auth-card"
      method="POST"
      action="/register"
    >

      <h2>
        Create your account
      </h2>

      <div class="two-col">

        <label class="field">

          <span>
            Full Name
          </span>

          <input
            type="text"
            name="name"
            id="name"
            placeholder="Enter full name"
            required
          />

        </label>

        <label class="field">

          <span>
            Phone Number
          </span>

          <input
            type="text"
            name="phone"
            id="phone"
            placeholder="9876543210"
            required
          />

        </label>

      </div>

      <button
        type="button"
        class="otp-btn"
        onclick="sendOTP()"
      >
        Send OTP
      </button>

      <div id="recaptcha-container"></div>

      <div id="otp-section">

        <label class="field">

          <span>
            Enter OTP
          </span>

          <input
            type="text"
            id="otp"
            placeholder="Enter OTP"
          />

        </label>

        <button
          type="button"
          class="otp-btn"
          onclick="verifyOTP()"
        >
          Verify OTP
        </button>

        <p
          id="otp-success"
          class="success-text"
        ></p>

      </div>

      <label class="field">

        <span>
          Password
        </span>

        <input
          type="password"
          name="password"
          placeholder="Create password"
          required
        />

      </label>

      <label class="field">

        <span>
          Confirm Password
        </span>

        <input
          type="password"
          name="confirm_password"
          placeholder="Confirm password"
          required
        />

      </label>

      <label class="field">

        <span>
          Blood Group
        </span>

        <input
          type="text"
          name="blood_group"
          placeholder="A+, O-, AB+"
          required
        />

      </label>

      <div class="two-col">

        <label class="field">

          <span>
            City
          </span>

          <input
            type="text"
            name="city"
            placeholder="Enter city"
            required
          />

        </label>

        <label class="field">

          <span>
            Pincode
          </span>

          <input
            type="text"
            name="pincode"
            placeholder="Enter pincode"
            required
          />

        </label>

      </div>

      <button
        type="submit"
        id="register-btn"
        class="btn-primary"
        disabled
      >
        Create Account
      </button>

      <div class="auth-links">

        <a href="/">
          Back to Home
        </a>

        <span class="dot">
          •
        </span>

        <a href="/login">
          Already have an account?
        </a>

      </div>

    </form>

  </div>

  <!-- Firebase -->

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>

    const firebaseConfig = {

      apiKey:
        "AIzaSyDmo_lZ992ShobFM3HEa7R0cvKdvQIkhtM",

      authDomain:
        "bloodlink-fbb09.firebaseapp.com",

      projectId:
        "bloodlink-fbb09",

      storageBucket:
        "bloodlink-fbb09.firebasestorage.app",

      messagingSenderId:
        "155362884956",

      appId:
        "1:155362884956:web:b8895727beda9134ea9599"

    };

    firebase.initializeApp(
      firebaseConfig
    );

    const auth =
      firebase.auth();

    window.recaptchaVerifier =
      new firebase.auth.RecaptchaVerifier(

        'recaptcha-container',

        {
          size:'normal'
        }

      );

    function sendOTP(){

      const phone =
        document.getElementById(
          "phone"
        ).value.trim();

      if(
        phone.length !== 10
      ){

        alert(
          "Enter valid 10 digit number"
        );

        return;
      }

      const fullPhone =
        "+91" + phone;

      auth.signInWithPhoneNumber(

        fullPhone,

        window.recaptchaVerifier

      )

      .then(function(result){

        window.confirmationResult =
          result;

        document.getElementById(
          "otp-section"
        ).style.display = "block";

        alert(
          "OTP Sent Successfully"
        );

      })

      .catch(function(error){

        alert(
          error.message
        );

      });

    }

    function verifyOTP(){

      const otp =
        document.getElementById(
          "otp"
        ).value;

      confirmationResult.confirm(
        otp
      )

      .then(function(result){

        document.getElementById(
          "otp-success"
        ).innerText =
          "Phone Verified Successfully";

        document.getElementById(
          "register-btn"
        ).disabled = false;

        alert(
          "OTP Verified Successfully"
        );

      })

      .catch(function(error){

        alert(
          "Invalid OTP"
        );

      });

    }

  </script>

</body>
</html>
