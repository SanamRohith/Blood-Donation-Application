<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>
    Register - BloodLink
  </title>

  <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static', filename='favicon.png') }}"
  />

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <div class="auth-wrap">

    <!-- TOP BRANDING -->

    <header class="auth-head">

      <div class="logo-container">

        <h1 class="logo">
          Blood<span>Link</span>
        </h1>

        <p class="tagline">
          Linking Blood to Life
        </p>

      </div>

    </header>


    <!-- REGISTER FORM -->

    <form
      id="register-form"
      class="auth-card"
      method="post"
      action="/register"
      novalidate
    >

      <h2>
        Create your account
      </h2>


      <!-- ERROR BOX -->

      <div
        id="register-errors"
        class="alert alert-error"
        style="display:none;"
      ></div>


      <!-- NAME + PHONE -->

      <div class="two-col">

        <label class="field">

          <span>
            Full Name
          </span>

          <input
            id="name"
            name="name"
            type="text"
            placeholder="Enter full name"
            required
          />

        </label>


        <label class="field">

          <span>
            Phone Number
          </span>

          <input
            id="phone"
            name="phone"
            type="text"
            placeholder="e.g. 9876543210"
            required
          />

        </label>

      </div>


      <!-- PASSWORD -->

      <label class="field">

        <span>
          Password
        </span>

        <input
          id="password"
          name="password"
          type="password"
          placeholder="Create a password"
          required
        />

      </label>


      <!-- CONFIRM PASSWORD -->

      <label class="field">

        <span>
          Confirm Password
        </span>

        <input
          id="confirm-password"
          name="confirm_password"
          type="password"
          placeholder="Confirm your password"
          required
        />

      </label>


      <!-- BLOOD GROUP -->

      <label class="field">

        <span>
          Blood Group
        </span>

        <input
          id="blood-group"
          name="blood_group"
          type="text"
          placeholder="e.g. O+, A-"
          required
        />

      </label>


      <!-- CITY + PINCODE -->

      <div class="two-col">

        <label class="field">

          <span>
            City
          </span>

          <input
            id="city"
            name="city"
            type="text"
            placeholder="Enter city"
            required
          />

        </label>


        <label class="field">

          <span>
            Pincode
          </span>

          <input
            id="pincode"
            name="pincode"
            type="text"
            placeholder="Enter pincode"
            required
          />

        </label>

      </div>


      <!-- BUTTON -->

      <button
        class="btn btn-primary btn-lg"
        type="submit"
      >
        Create Account
      </button>


      <!-- LINKS -->

      <div class="auth-links">

        <a
          class="btn btn-link"
          href="/"
        >
          Back to Home
        </a>

        <span class="dot">
          •
        </span>

        <a
          class="btn btn-link"
          href="/login"
        >
          Already have an account?
        </a>

      </div>

    </form>

  </div>


  <!-- VALIDATION -->

  <script>

    const registerForm =
      document.getElementById(
        "register-form"
      );

    registerForm.addEventListener(
      "submit",
      function(e){

        let hasError = false;

        const fields = [

          {
            id:"name",
            message:"Full Name is required."
          },

          {
            id:"phone",
            message:"Phone Number is required."
          },

          {
            id:"password",
            message:"Password is required."
          },

          {
            id:"blood-group",
            message:"Blood Group is required."
          },

          {
            id:"city",
            message:"City is required."
          },

          {
            id:"pincode",
            message:"Pincode is required."
          }

        ];

        document
          .querySelectorAll(".error-text")
          .forEach(el => el.remove());

        document
          .querySelectorAll(".input-error")
          .forEach(el => {
            el.classList.remove(
              "input-error"
            );
          });

        fields.forEach(field => {

          const input =
            document.getElementById(
              field.id
            );

          if(
            !input.value.trim()
          ){

            hasError = true;

            input.classList.add(
              "input-error"
            );

            const error =
              document.createElement(
                "small"
              );

            error.className =
              "error-text";

            error.innerText =
              field.message;

            input.parentElement.appendChild(
              error
            );
          }
        });

        const password =
          document.getElementById(
            "password"
          );

        const confirmPassword =
          document.getElementById(
            "confirm-password"
          );

        if(
          password.value &&
          confirmPassword.value &&
          password.value !==
          confirmPassword.value
        ){

          hasError = true;

          confirmPassword.classList.add(
            "input-error"
          );

          const error =
            document.createElement(
              "small"
            );

          error.className =
            "error-text";

          error.innerText =
            "Passwords do not match.";

          confirmPassword
            .parentElement
            .appendChild(error);
        }

        if(hasError){

          e.preventDefault();
        }

      }
    );

  </script>

</body>
</html>
```
