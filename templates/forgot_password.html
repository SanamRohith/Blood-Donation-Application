<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password - Blood_Info_Services</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="auth-wrap">
    <header class="auth-head">
      <a class="brand" href="/">Blood_Info_Services</a>
      <div class="auth-sub">Fast • Safe • Private Communication</div>
    </header>

    <form class="auth-card" method="post" action="/forgot_password" novalidate>
      <h2>Reset Password</h2>
      <p class="muted">Enter your registered phone number. We’ll validate your account and let you reset your password.</p>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="alert alert-success">{{ success }}</div>
      {% endif %}

      <label class="field">
        <span>Phone Number</span>
        <input name="phone" type="text" placeholder="Enter registered phone" required />
      </label>

      <button class="btn btn-primary" type="submit">Continue</button>
      <a class="btn btn-link" href="/">Back to Home</a>
    </form>
  </div>
</body>
</html>
